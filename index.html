<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAZE</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="game"></canvas>

  <div id="startScreen">
    <h1>3D 미로 탈출</h1>
    <p>WASD 이동 / 마우스 시점 / Space 길게 달리기</p>
    <p>초록색 바닥 타일을 밟으면 다음 스테이지로 이동합니다.</p>
    <button id="startBtn">시작하기</button>
  </div>

  <div id="settingScreen" class="hidden">
    <div class="settingBox">
      <h2>설정</h2>

      <label>
        마우스 감도
        <input id="sensitivitySlider" type="range" min="0.3" max="3" step="0.1" value="0.75">
      </label>

      <label>
        밝기
        <input id="brightnessSlider" type="range" min="0.6" max="1.8" step="0.1" value="1">
      </label>

      <p class="small">ESC를 다시 누르거나 계속하기를 누르면 게임으로 돌아갑니다.</p>
      <button id="resumeBtn">계속하기</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
